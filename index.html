<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё файловое хранилище</title>
  <!-- Иконки Font Awesome для красоты -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ---- Глобальные переменные ---- */
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
    }

    /* ---- Шапка ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.5px;
    }
    .header i {
      font-size: 28px;
      color: var(--accent);
    }

    /* ---- Хлебные крошки ---- */
    .breadcrumb {
      background: var(--surface);
      padding: 14px 20px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 16px;
    }
    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .breadcrumb a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .breadcrumb .home-icon {
      font-size: 20px;
      margin-right: 4px;
    }
    .breadcrumb .separator {
      color: var(--text-secondary);
      margin: 0 4px;
    }
    .breadcrumb .current {
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ---- Список файлов ---- */
    .file-list {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      list-style: none;
      padding: 0;
    }
    .file-list li {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s;
    }
    .file-list li:last-child { border-bottom: none; }
    .file-list li:hover {
      background: rgba(255,255,255,0.04);
    }

    .file-list .icon {
      font-size: 22px;
      width: 32px;
      text-align: center;
      color: var(--text-secondary);
    }
    .file-list .name {
      flex: 1;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 16px;
    }
    .file-list .name:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }
    .file-list .size {
      color: var(--text-secondary);
      font-size: 14px;
      margin-left: auto;
      white-space: nowrap;
    }
    .file-list .download-icon {
      color: var(--text-secondary);
      font-size: 16px;
      margin-left: 12px;
      transition: color 0.2s;
    }
    .file-list .download-icon:hover {
      color: var(--accent);
    }

    /* ---- Состояния загрузки и ошибок ---- */
    .loading, .empty, .error {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    .error { color: #f85149; }
    .empty { color: var(--text-secondary); }
    .loading i { margin-right: 10px; }

    /* ---- Адаптивность ---- */
    @media (max-width: 600px) {
      body { padding: 20px 12px; }
      .breadcrumb { font-size: 14px; padding: 12px 16px; }
      .file-list li { padding: 12px 16px; flex-wrap: wrap; }
      .file-list .size { margin-left: 0; width: 100%; padding-left: 46px; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Шапка -->
  <div class="header">
    <i class="fas fa-cloud-upload-alt"></i>
    <h1>Файловое хранилище</h1>
  </div>

  <!-- Хлебные крошки -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- Список -->
  <ul class="file-list" id="file-list">
    <li class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</li>
  </ul>
</div>

<script>
  // -------------------------------------------------------------
  //  НАСТРОЙКИ
  // -------------------------------------------------------------
  const USERNAME = 'kompypro';        // ЗАМЕНИТЕ на своё
  const REPO = 'kompypro.github.io';
  const BRANCH = 'main';             // или 'master'

  // -------------------------------------------------------------
  //  ЗАЩИТА ПАРОЛЕМ (простая)
  //  Если пароль не нужен, закомментируйте или удалите блок ниже.
  // -------------------------------------------------------------
  const CORRECT_PASSWORD = 'pwztj3r2'';  // Установите свой пароль

  // Проверяем, есть ли уже сессия (в sessionStorage)
  if (!sessionStorage.getItem('loggedIn')) {
    const userPass = prompt('Введите пароль для доступа:');
    if (userPass !== CORRECT_PASSWORD) {
      document.body.innerHTML = '<div style="text-align:center;margin-top:100px;color:#f85149;font-size:24px;"><i class="fas fa-lock"></i> Доступ запрещён</div>';
      throw new Error('Неверный пароль');
    }
    sessionStorage.setItem('loggedIn', 'true');
  }

  // -------------------------------------------------------------
  //  ОСНОВНАЯ ЛОГИКА (та же, что и раньше, но с улучшенными иконками)
  // -------------------------------------------------------------
  let currentPath = decodeURIComponent(window.location.hash.substring(1) || '');

  function downloadFile(url, filename) {
    const list = document.getElementById('file-list');
    list.innerHTML = `<li class="loading"><i class="fas fa-spinner fa-pulse"></i> Скачивание ${filename}...</li>`;
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('Ошибка загрузки: ' + res.status);
        return res.blob();
      })
      .then(blob => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        loadContents(currentPath);
      })
      .catch(err => {
        alert('Не удалось скачать: ' + err.message);
        loadContents(currentPath);
      });
  }

  function updatePath(path) {
    currentPath = path;
    window.location.hash = encodeURIComponent(path);
    loadContents(path);
    updateBreadcrumb(path);
  }

  function updateBreadcrumb(path) {
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = '';
    if (path) {
      const home = document.createElement('a');
      home.className = 'home-icon';
      home.innerHTML = '<i class="fas fa-home"></i>';
      home.onclick = () => updatePath('');
      home.href = '#';
      home.title = 'В корень';
      bc.appendChild(home);
      const sep = document.createElement('span');
      sep.className = 'separator';
      sep.textContent = ' / ';
      bc.appendChild(sep);
    }
    const parts = path.split('/').filter(p => p);
    let accumulated = '';
    parts.forEach((part, index) => {
      accumulated += (index === 0 ? '' : '/') + part;
      const isLast = (index === parts.length - 1);
      if (isLast) {
        const span = document.createElement('span');
        span.className = 'current';
        span.textContent = part;
        bc.appendChild(span);
      } else {
        const link = document.createElement('a');
        link.textContent = part;
        link.onclick = () => updatePath(accumulated);
        link.href = '#';
        bc.appendChild(link);
        const sep2 = document.createElement('span');
        sep2.className = 'separator';
        sep2.textContent = ' / ';
        bc.appendChild(sep2);
      }
    });
    if (!path) bc.innerHTML = '<span class="current">/</span>';
  }

  function loadContents(path) {
    const list = document.getElementById('file-list');
    list.innerHTML = `<li class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</li>`;

    const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${path}?ref=${BRANCH}`;

    fetch(apiUrl)
      .then(res => {
        if (!res.ok) throw new Error(`Ошибка ${res.status}: ${res.statusText}`);
        return res.json();
      })
      .then(data => {
        list.innerHTML = '';
        if (!Array.isArray(data)) {
          list.innerHTML = '<li class="error"><i class="fas fa-exclamation-triangle"></i> Это не папка или файл повреждён</li>';
          return;
        }
        const folders = data.filter(item => item.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
        const files = data.filter(item => item.type === 'file').sort((a,b) => a.name.localeCompare(b.name));
        const all = [...folders, ...files];

        if (all.length === 0) {
          list.innerHTML = '<li class="empty"><i class="far fa-folder-open"></i> Папка пуста</li>';
          return;
        }

        all.forEach(item => {
          const li = document.createElement('li');
          const iconSpan = document.createElement('span');
          iconSpan.className = 'icon';
          iconSpan.innerHTML = item.type === 'dir'
            ? '<i class="fas fa-folder"></i>'
            : '<i class="fas fa-file"></i>';
          li.appendChild(iconSpan);

          const nameLink = document.createElement('a');
          nameLink.className = 'name';
          nameLink.textContent = item.name;

          if (item.type === 'dir') {
            nameLink.onclick = (e) => {
              e.preventDefault();
              const newPath = path ? path + '/' + item.name : item.name;
              updatePath(newPath);
            };
            nameLink.href = '#';
          } else {
            nameLink.href = '#';
            nameLink.onclick = (e) => {
              e.preventDefault();
              downloadFile(item.download_url, item.name);
            };
            // Иконка скачивания
            const dlIcon = document.createElement('span');
            dlIcon.className = 'download-icon';
            dlIcon.innerHTML = '<i class="fas fa-download"></i>';
            li.appendChild(dlIcon);
          }
          li.appendChild(nameLink);

          if (item.type === 'file' && item.size !== undefined) {
            const sizeSpan = document.createElement('span');
            sizeSpan.className = 'size';
            const sizeKB = (item.size / 1024).toFixed(1);
            sizeSpan.textContent = sizeKB >= 1024
              ? (item.size / (1024*1024)).toFixed(1) + ' MB'
              : sizeKB + ' KB';
            li.appendChild(sizeSpan);
          }
          list.appendChild(li);
        });
      })
      .catch(err => {
        list.innerHTML = `<li class="error"><i class="fas fa-exclamation-circle"></i> Ошибка: ${err.message}</li>`;
      });
  }

  // ---- Инициализация ----
  window.addEventListener('load', () => {
    const hash = window.location.hash.substring(1);
    if (hash) currentPath = decodeURIComponent(hash);
    updateBreadcrumb(currentPath);
    loadContents(currentPath);
  });

  window.addEventListener('hashchange', () => {
    const newPath = decodeURIComponent(window.location.hash.substring(1) || '');
    if (newPath !== currentPath) {
      currentPath = newPath;
      updateBreadcrumb(currentPath);
      loadContents(currentPath);
    }
  });
</script>
</body>
</html>
