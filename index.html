<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КомпыПро Файлы</title>
  <!-- Подключаем Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ===== Все стили остаются как были ===== */
    :root {
      --bg-body: #0d1117;
      --bg-card: #161b22;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-accent: #58a6ff;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .profile-header {
      position: relative;
      background: linear-gradient(135deg, #1e2a3a 0%, #2d3b4f 100%);
      padding: 40px 30px 20px 30px;
      border-bottom: 2px solid var(--border-color);
      flex-shrink: 0;
    }
    .profile-header .cover {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }
    .profile-header .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: #fff;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    .profile-header .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .profile-header .avatar .initials {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: #1e2a3a;
      background: #e6edf3;
    }
    .profile-header .info {
      flex: 1;
      min-width: 200px;
    }
    .profile-header .info h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .profile-header .info .status {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .profile-header .info .status .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 4px;
    }

    /* Убрали кнопки, оставили только счётчик */
    .profile-header .actions {
      display: flex;
      align-items: center;
    }
    .profile-header .file-count {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }

    /* Остальные стили (меню, список, адаптив) – без изменений */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 240px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-color);
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      padding: 0 20px 14px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .sidebar-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      color: var(--text-primary);
      transition: background 0.2s, border-color 0.2s;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: #1c2333; }
    .sidebar-item.active {
      background: #1f2937;
      border-left-color: var(--text-accent);
      font-weight: 500;
      color: var(--text-accent);
    }
    .sidebar-item .icon { font-size: 18px; }

    .main-content {
      flex: 1;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-body);
    }

    .breadcrumb {
      background: var(--bg-card);
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 15px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .breadcrumb a {
      color: var(--text-accent);
      text-decoration: none;
      cursor: pointer;
    }
    .breadcrumb a:hover { color: #79c0ff; text-decoration: underline; }
    .breadcrumb .home-icon { font-size: 18px; margin-right: 4px; }
    .breadcrumb .separator { color: var(--text-secondary); margin: 0 4px; }
    .breadcrumb .current { color: var(--text-primary); font-weight: 500; }

    .file-grid {
      flex: 1;
      overflow-y: auto;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      padding: 0;
      list-style: none;
    }
    .file-grid li {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.15s;
      gap: 16px;
      cursor: pointer;
    }
    .file-grid li:last-child { border-bottom: none; }
    .file-grid li:hover { background: #1c2333; }
    .file-grid li .icon {
      font-size: 22px;
      width: 32px;
      text-align: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .file-grid li .name {
      flex: 1;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      pointer-events: none;
    }
    .file-grid li .size {
      color: var(--text-secondary);
      font-size: 14px;
      white-space: nowrap;
      margin-right: 16px;
    }
    .file-grid li .actions {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    .file-grid li .actions button {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .file-grid li .actions button:hover {
      background: #1c2333;
      border-color: var(--text-accent);
      color: var(--text-accent);
    }
    .file-grid li .actions button.copy-link {
      border-color: #238636;
      color: #3fb950;
    }
    .file-grid li .actions button.copy-link:hover {
      background: rgba(35, 134, 54, 0.15);
      border-color: #2ea44f;
      color: #4cda64;
    }

    .loading, .empty, .error {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    .error { color: #f85149; }

    @media (max-width: 700px) {
      .profile-header { padding: 20px 16px; }
      .profile-header .cover { flex-direction: column; align-items: center; text-align: center; }
      .profile-header .info h1 { font-size: 24px; }
      .profile-header .actions { justify-content: center; }
      .main-layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
        flex-direction: row;
        overflow-x: auto;
        padding: 10px 16px;
        gap: 6px;
      }
      .sidebar-title { display: none; }
      .sidebar-item {
        padding: 6px 14px;
        border-left: none;
        border-bottom: 3px solid transparent;
        white-space: nowrap;
        font-size: 14px;
      }
      .sidebar-item.active { border-left: none; border-bottom-color: var(--text-accent); }
      .main-content { padding: 16px; }
      .file-grid li { flex-wrap: wrap; gap: 8px; }
      .file-grid li .size { margin-right: 0; width: 100%; padding-left: 48px; }
      .file-grid li .actions { margin-left: 48px; }
    }
  </style>
</head>
<body>

  <header class="profile-header">
    <div class="cover">
      <div class="avatar">
        <!-- Замените ссылку на свою аватарку или используйте инициалы -->
        <img src="https://avatars.githubusercontent.com/ваш-логин" alt="Аватар" />
        <!-- <div class="initials">КП</div> -->
      </div>
      <div class="info">
        <h1>КомпыПро</h1>
        <div class="status">
          <span class="dot"></span> В сети · Хранилище файлов
        </div>
      </div>
      <div class="actions">
        <!-- Кнопки "Загрузить" и "Поделиться" УДАЛЕНЫ -->
        <span class="file-count">📂 <span id="file-counter">0</span> файлов</span>
      </div>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Разделы</div>
      <div id="sidebar-list"></div>
    </aside>

    <main class="main-content">
      <div class="breadcrumb" id="breadcrumb"></div>
      <ul class="file-grid" id="file-list"><li class="loading">⏳ Загрузка...</li></ul>
    </main>
  </div>

  <script>
    // ================================================================
    //  НАСТРОЙКИ (поменяйте только USERNAME)
    // ================================================================
    const USERNAME = 'kompypro';          // 👈 ваш логин
    const REPO = 'kompypro.github.io';
    const BRANCH = 'main';                // или 'master'

    // ----------------------------------------------------------------
    //  ВЕСЬ ОСТАЛЬНОЙ КОД (без изменений)
    // ----------------------------------------------------------------

    let currentPath = '';
    let currentSection = '';

    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const map = {
        'pdf': 'fa-file-pdf',
        'jpg': 'fa-file-image',
        'jpeg': 'fa-file-image',
        'png': 'fa-file-image',
        'gif': 'fa-file-image',
        'svg': 'fa-file-image',
        'zip': 'fa-file-archive',
        'rar': 'fa-file-archive',
        '7z': 'fa-file-archive',
        'tar': 'fa-file-archive',
        'gz': 'fa-file-archive',
        'doc': 'fa-file-word',
        'docx': 'fa-file-word',
        'xls': 'fa-file-excel',
        'xlsx': 'fa-file-excel',
        'ppt': 'fa-file-powerpoint',
        'pptx': 'fa-file-powerpoint',
        'mp4': 'fa-file-video',
        'avi': 'fa-file-video',
        'mkv': 'fa-file-video',
        'mp3': 'fa-file-audio',
        'wav': 'fa-file-audio',
        'txt': 'fa-file-alt',
        'md': 'fa-file-alt',
        'json': 'fa-file-code',
        'xml': 'fa-file-code',
        'html': 'fa-file-code',
        'css': 'fa-file-code',
        'js': 'fa-file-code',
        'py': 'fa-file-code',
        'java': 'fa-file-code',
        'c': 'fa-file-code',
        'cpp': 'fa-file-code',
        'exe': 'fa-file',
        'msi': 'fa-file',
      };
      return map[ext] || 'fa-file';
    }

    function downloadFile(url, filename) {
      const list = document.getElementById('file-list');
      list.innerHTML = `<li class="loading">⏳ Скачивание ${filename}...</li>`;
      fetch(url)
        .then(r => { if (!r.ok) throw new Error('Ошибка загрузки'); return r.blob(); })
        .then(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
          loadContents(currentSection, currentPath);
        })
        .catch(err => { alert('Не удалось скачать: ' + err.message); loadContents(currentSection, currentPath); });
    }

    function copyLink(fileUrl, filename) {
      navigator.clipboard.writeText(fileUrl)
        .then(() => alert(`Ссылка на "${filename}" скопирована!`))
        .catch(() => {
          const input = document.createElement('input');
          input.value = fileUrl;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          input.remove();
          alert(`Ссылка скопирована!`);
        });
    }

    function navigateTo(section, path) {
      currentSection = section;
      currentPath = path || '';
      window.location.hash = section + (path ? '/' + path : '');
      loadContents(section, currentPath);
      updateBreadcrumb(section, currentPath);
      updateSidebarActive(section);
    }

    function loadContents(section, path) {
      const list = document.getElementById('file-list');
      list.innerHTML = '<li class="loading">⏳ Загрузка...</li>';

      const fullPath = section ? (path ? section + '/' + path : section) : '';
      const apiUrl = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${fullPath}?ref=${BRANCH}`;

      fetch(apiUrl)
        .then(res => {
          if (!res.ok) throw new Error(`Ошибка ${res.status}`);
          return res.json();
        })
        .then(data => {
          list.innerHTML = '';
          if (!Array.isArray(data)) {
            list.innerHTML = '<li class="error">❌ Это не папка или файл повреждён</li>';
            return;
          }

          const excluded = ['index.html', 'readme.md'];
          const folders = data.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
          const files = data
            .filter(i => i.type === 'file' && !excluded.includes(i.name.toLowerCase()))
            .sort((a,b) => a.name.localeCompare(b.name));
          const all = [...folders, ...files];

          document.getElementById('file-counter').textContent = files.length;

          if (all.length === 0) {
            list.innerHTML = '<li class="empty">📭 Папка пуста</li>';
            return;
          }

          all.forEach(item => {
            const li = document.createElement('li');

            const iconSpan = document.createElement('span');
            iconSpan.className = 'icon';
            if (item.type === 'dir') {
              iconSpan.innerHTML = '<i class="fas fa-folder"></i>';
            } else {
              const iconClass = getFileIcon(item.name);
              iconSpan.innerHTML = `<i class="fas ${iconClass}"></i>`;
            }
            li.appendChild(iconSpan);

            const nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = item.name;
            li.appendChild(nameSpan);

            if (item.type === 'file' && item.size !== undefined) {
              const sizeSpan = document.createElement('span');
              sizeSpan.className = 'size';
              const sizeKB = (item.size / 1024).toFixed(1);
              sizeSpan.textContent = sizeKB >= 1024 ? (item.size / (1024*1024)).toFixed(1) + ' MB' : sizeKB + ' KB';
              li.appendChild(sizeSpan);
            }

            if (item.type === 'file') {
              const actions = document.createElement('div');
              actions.className = 'actions';

              const dlBtn = document.createElement('button');
              dlBtn.innerHTML = '<i class="fas fa-download"></i> Скачать';
              dlBtn.onclick = (e) => {
                e.stopPropagation();
                downloadFile(item.download_url, item.name);
              };
              actions.appendChild(dlBtn);

              const copyBtn = document.createElement('button');
              copyBtn.className = 'copy-link';
              copyBtn.innerHTML = '<i class="fas fa-link"></i> Ссылка';
              copyBtn.onclick = (e) => {
                e.stopPropagation();
                copyLink(item.download_url, item.name);
              };
              actions.appendChild(copyBtn);

              li.appendChild(actions);
            }

            li.onclick = (e) => {
              if (e.target.closest('button')) return;
              if (item.type === 'dir') {
                const newPath = path ? path + '/' + item.name : item.name;
                navigateTo(section, newPath);
              } else {
                downloadFile(item.download_url, item.name);
              }
            };

            list.appendChild(li);
          });
        })
        .catch(err => {
          list.innerHTML = `<li class="error">❌ Ошибка: ${err.message}</li>`;
        });
    }

    function updateBreadcrumb(section, path) {
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';

      if (section) {
        const home = document.createElement('a');
        home.className = 'home-icon';
        home.innerHTML = '<i class="fas fa-home"></i>';
        home.onclick = () => { navigateTo('', ''); };
        home.href = '#';
        home.title = 'В корень';
        bc.appendChild(home);
        const sep = document.createElement('span');
        sep.className = 'separator';
        sep.textContent = ' / ';
        bc.appendChild(sep);

        const sectionLink = document.createElement('a');
        sectionLink.textContent = section;
        sectionLink.onclick = () => { navigateTo(section, ''); };
        sectionLink.href = '#';
        bc.appendChild(sectionLink);
      } else {
        bc.textContent = '/';
        return;
      }

      if (path) {
        const parts = path.split('/').filter(p => p);
        let accumulated = '';
        parts.forEach((part, index) => {
          const sep2 = document.createElement('span');
          sep2.className = 'separator';
          sep2.textContent = ' / ';
          bc.appendChild(sep2);
          accumulated += (index === 0 ? '' : '/') + part;
          const isLast = (index === parts.length - 1);
          if (isLast) {
            const span = document.createElement('span');
            span.className = 'current';
            span.textContent = part;
            bc.appendChild(span);
          } else {
            const link = document.createElement('a');
            link.textContent = part;
            link.onclick = () => { navigateTo(section, accumulated); };
            link.href = '#';
            bc.appendChild(link);
          }
        });
      }
    }

    function updateSidebarActive(section) {
      document.querySelectorAll('.sidebar-item').forEach(el => {
        el.classList.toggle('active', el.dataset.section === section);
      });
    }

    function loadSections() {
      const sidebarList = document.getElementById('sidebar-list');
      sidebarList.innerHTML = '<div class="sidebar-item" style="cursor:default;color:var(--text-secondary);">Загрузка...</div>';

      const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/?ref=${BRANCH}`;
      fetch(url)
        .then(res => res.json())
        .then(data => {
          sidebarList.innerHTML = '';
          const dirs = data.filter(item => item.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));

          const rootItem = document.createElement('div');
          rootItem.className = 'sidebar-item';
          rootItem.dataset.section = '';
          rootItem.innerHTML = '<span class="icon"><i class="fas fa-folder-open"></i></span> Все файлы';
          rootItem.onclick = () => { navigateTo('', ''); };
          sidebarList.appendChild(rootItem);

          dirs.forEach(dir => {
            const item = document.createElement('div');
            item.className = 'sidebar-item';
            item.dataset.section = dir.name;
            item.innerHTML = `<span class="icon"><i class="fas fa-folder"></i></span> ${dir.name}`;
            item.onclick = () => { navigateTo(dir.name, ''); };
            sidebarList.appendChild(item);
          });

          if (currentSection) updateSidebarActive(currentSection);
          else updateSidebarActive('');
        })
        .catch(err => {
          sidebarList.innerHTML = `<div class="sidebar-item" style="color:#f85149;">Ошибка загрузки</div>`;
        });
    }

    function init() {
      const hash = window.location.hash.substring(1);
      if (hash) {
        const parts = hash.split('/');
        currentSection = parts[0] || '';
        currentPath = parts.slice(1).join('/');
      }
      loadSections();
      navigateTo(currentSection, currentPath);
    }

    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.substring(1);
      const parts = hash.split('/');
      const sec = parts[0] || '';
      const p = parts.slice(1).join('/');
      if (sec !== currentSection || p !== currentPath) {
        currentSection = sec;
        currentPath = p;
        loadContents(currentSection, currentPath);
        updateBreadcrumb(currentSection, currentPath);
        updateSidebarActive(currentSection);
      }
    });

    init();
  </script>
</body>
</html>
